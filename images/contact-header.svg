<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 300" width="1400" height="300">
  <defs>
    <!-- Dot grid -->
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#1f1f1f"/>
    </pattern>
    <!-- Edge fades -->
    <linearGradient id="fadeL" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"  stop-color="#111" stop-opacity="1"/>
      <stop offset="14%" stop-color="#111" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="0" x2="1" y1="0" y2="0">
      <stop offset="86%" stop-color="#111" stop-opacity="0"/>
      <stop offset="100%" stop-color="#111" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="300" fill="#111"/>
  <rect width="1400" height="300" fill="url(#dots)"/>

  <!-- ======= LEFT HUB — signal broadcast ======= -->
  <!-- Signal rings (concentric, fading) -->
  <circle cx="195" cy="150" r="38"  fill="none" stroke="#c4161c" stroke-width="1"   opacity="0.18"/>
  <circle cx="195" cy="150" r="65"  fill="none" stroke="#c4161c" stroke-width="1"   opacity="0.11"/>
  <circle cx="195" cy="150" r="95"  fill="none" stroke="#c4161c" stroke-width="0.8" opacity="0.06"/>
  <circle cx="195" cy="150" r="125" fill="none" stroke="#c4161c" stroke-width="0.6" opacity="0.03"/>

  <!-- Dashed outgoing connection lines from left hub -->
  <line x1="230" y1="130" x2="530" y2="110" stroke="#282828" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="230" y1="150" x2="530" y2="150" stroke="#282828" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="230" y1="170" x2="530" y2="190" stroke="#282828" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- Satellite nodes left -->
  <circle cx="90"  cy="80"  r="5" fill="#252525" stroke="#383838" stroke-width="1.5"/>
  <circle cx="100" cy="230" r="5" fill="#252525" stroke="#383838" stroke-width="1.5"/>
  <line x1="155" y1="135" x2="93"  y2="85"  stroke="#1e1e1e" stroke-width="1"/>
  <line x1="155" y1="165" x2="104" y2="226" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Left hub node -->
  <circle cx="195" cy="150" r="14" fill="#161616" stroke="#c4161c" stroke-width="2"/>
  <circle cx="195" cy="150" r="5"  fill="#c4161c"/>

  <!-- ======= CENTER HUB ======= -->
  <!-- Center connection cross -->
  <line x1="530" y1="110" x2="870" y2="110" stroke="#282828" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="530" y1="190" x2="870" y2="190" stroke="#282828" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="700" y1="110" x2="700" y2="190" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Mid relay nodes -->
  <circle cx="530" cy="110" r="7" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="530" cy="110" r="2.5" fill="#3a3a3a"/>
  <circle cx="530" cy="190" r="7" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="530" cy="190" r="2.5" fill="#3a3a3a"/>
  <circle cx="530" cy="150" r="5" fill="#252525" stroke="#333" stroke-width="1"/>
  <line x1="530" y1="110" x2="530" y2="190" stroke="#282828" stroke-width="1.5" stroke-dasharray="3,4"/>

  <circle cx="870" cy="110" r="7" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="870" cy="110" r="2.5" fill="#3a3a3a"/>
  <circle cx="870" cy="190" r="7" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="870" cy="190" r="2.5" fill="#3a3a3a"/>
  <circle cx="870" cy="150" r="5" fill="#252525" stroke="#333" stroke-width="1"/>
  <line x1="870" y1="110" x2="870" y2="190" stroke="#282828" stroke-width="1.5" stroke-dasharray="3,4"/>

  <!-- Center hub ring + node -->
  <circle cx="700" cy="150" r="22" fill="#161616" stroke="#2e2e2e" stroke-width="1.5"/>
  <circle cx="700" cy="150" r="14" fill="#1a1a1a" stroke="#c4161c" stroke-width="2"/>
  <circle cx="700" cy="150" r="5"  fill="#c4161c"/>

  <!-- Traveling data dots -->
  <circle cx="360" cy="121" r="2.5" fill="#c4161c" opacity="0.55"/>
  <circle cx="450" cy="116" r="2"   fill="#c4161c" opacity="0.35"/>
  <circle cx="615" cy="110" r="2.5" fill="#444"/>
  <circle cx="760" cy="110" r="2.5" fill="#444"/>
  <circle cx="615" cy="190" r="2.5" fill="#444"/>
  <circle cx="760" cy="190" r="2.5" fill="#444"/>
  <circle cx="980" cy="116" r="2"   fill="#c4161c" opacity="0.35"/>
  <circle cx="1060" cy="121" r="2.5" fill="#c4161c" opacity="0.55"/>

  <!-- ======= RIGHT HUB — signal broadcast ======= -->
  <!-- Dashed incoming lines -->
  <line x1="870" y1="110" x2="1170" y2="130" stroke="#282828" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="870" y1="150" x2="1170" y2="150" stroke="#282828" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="870" y1="190" x2="1170" y2="170" stroke="#282828" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- Signal rings right hub -->
  <circle cx="1205" cy="150" r="38"  fill="none" stroke="#c4161c" stroke-width="1"   opacity="0.18"/>
  <circle cx="1205" cy="150" r="65"  fill="none" stroke="#c4161c" stroke-width="1"   opacity="0.11"/>
  <circle cx="1205" cy="150" r="95"  fill="none" stroke="#c4161c" stroke-width="0.8" opacity="0.06"/>
  <circle cx="1205" cy="150" r="125" fill="none" stroke="#c4161c" stroke-width="0.6" opacity="0.03"/>

  <!-- Satellite nodes right -->
  <circle cx="1310" cy="80"  r="5" fill="#252525" stroke="#383838" stroke-width="1.5"/>
  <circle cx="1300" cy="230" r="5" fill="#252525" stroke="#383838" stroke-width="1.5"/>
  <line x1="1245" y1="135" x2="1307" y2="83"  stroke="#1e1e1e" stroke-width="1"/>
  <line x1="1245" y1="165" x2="1297" y2="227" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Right hub node -->
  <circle cx="1205" cy="150" r="14" fill="#161616" stroke="#c4161c" stroke-width="2"/>
  <circle cx="1205" cy="150" r="5"  fill="#c4161c"/>

  <!-- Red accent bar -->
  <rect x="0" y="292" width="1400" height="8" fill="#c4161c" opacity="0.65"/>

  <!-- Edge fades -->
  <rect width="1400" height="300" fill="url(#fadeL)"/>
  <rect width="1400" height="300" fill="url(#fadeR)"/>
</svg>
